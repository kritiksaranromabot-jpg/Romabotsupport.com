<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMA SUPPORT SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: #eee; font-family: sans-serif; }
        .glass { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; }
        .admin-only { display: none; }
        input, textarea, select { background: #000 !important; color: white !important; border: 1px solid #444 !important; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-10 mt-5">
        <h1 class="text-2xl font-black italic text-blue-500">ROMA <span class="text-white">SUPPORT</span></h1>
        <button onclick="openAdmin()" class="bg-gray-800 p-2 px-4 rounded text-xs hover:bg-gray-700 transition">
            <i class="fas fa-lock mr-2"></i>ADMIN PANEL
        </button>
    </div>

    <div id="userPanel" class="max-w-2xl mx-auto glass p-8 shadow-2xl">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fas fa-bug text-red-500"></i> Kirim Laporan / Bug
        </h2>
        <form id="reportForm" class="space-y-4">
            <div>
                <label class="text-xs text-gray-500 uppercase font-bold">Nama / WhatsApp</label>
                <input type="text" id="user" class="w-full p-3 rounded mt-1 outline-none" placeholder="Contoh: Roma / 628..." required>
            </div>
            <div>
                <label class="text-xs text-gray-500 uppercase font-bold">Tipe Masalah</label>
                <select id="type" class="w-full p-3 rounded mt-1 outline-none">
                    <option>Bug Database</option>
                    <option>Saran Fitur</option>
                    <option>Laporan User</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-gray-500 uppercase font-bold">Deskripsi</label>
                <textarea id="msg" class="w-full p-3 rounded mt-1 outline-none h-32" placeholder="Detail laporan..." required></textarea>
            </div>
            <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded font-black transition">
                KIRIM SEKARANG
            </button>
        </form>
    </div>

    <div id="adminPanel" class="max-w-5xl mx-auto admin-only">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-green-500 italic"><i class="fas fa-database mr-2"></i>DATA LAPORAN MASUK</h2>
            <button onclick="closeAdmin()" class="text-red-500 font-bold">KELUAR</button>
        </div>

        <div class="glass overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-blue-900/20 text-blue-400">
                    <tr>
                        <th class="p-4">WAKTU</th>
                        <th class="p-4">PENGIRIM</th>
                        <th class="p-4">TIPE</th>
                        <th class="p-4">PESAN</th>
                        <th class="p-4 text-center">AKSI</th>
                    </tr>
                </thead>
                <tbody id="reportList">
                    </tbody>
            </table>
        </div>
        <button onclick="clearData()" class="mt-4 text-xs text-gray-600 hover:text-red-500">Hapus Semua Data Laporan</button>
    </div>

    <script>
        // --- LOGIC DATABASE (Lokal di Browser) ---
        let db = JSON.parse(localStorage.getItem('romaReports')) || [];

        // Simpan Laporan (User)
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newReport = {
                id: Date.now(),
                time: new Date().toLocaleString(),
                user: document.getElementById('user').value,
                type: document.getElementById('type').value,
                msg: document.getElementById('msg').value
            };
            db.push(newReport);
            localStorage.setItem('romaReports', JSON.stringify(db));
            alert('✅ Laporan terkirim ke database Roma!');
            this.reset();
        });

        // Buka Panel Admin dengan Password
        function openAdmin() {
            const pass = prompt("MASUKKAN PASSWORD OWNER:");
            if (pass === "piala100") {
                document.getElementById('userPanel').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('admin-only');
                renderReports();
            } else {
                alert("❌ PASSWORD SALAH, TOLOL!");
            }
        }

        // Tutup Panel
        function closeAdmin() {
            document.getElementById('adminPanel').classList.add('admin-only');
            document.getElementById('userPanel').classList.remove('hidden');
        }

        // Tampilkan Data ke Tabel
        function renderReports() {
            const list = document.getElementById('reportList');
            list.innerHTML = '';
            
            if (db.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-600">Belum ada laporan masuk.</td></tr>';
                return;
            }

            db.reverse().forEach((item, index) => {
                list.innerHTML += `
                    <tr class="border-t border-gray-800 hover:bg-white/5 transition">
                        <td class="p-4 text-gray-500 text-[10px]">${item.time}</td>
                        <td class="p-4 font-bold text-blue-400">${item.user}</td>
                        <td class="p-4"><span class="bg-blue-900/40 text-blue-300 px-2 py-1 rounded text-[10px] uppercase">${item.type}</span></td>
                        <td class="p-4 text-gray-300">${item.msg}</td>
                        <td class="p-4 text-center">
                            <button onclick="deleteSingle(${item.id})" class="text-red-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // Hapus satu per satu
        function deleteSingle(id) {
            if(confirm('Hapus laporan ini?')) {
                db = db.filter(item => item.id !== id);
                localStorage.setItem('romaReports', JSON.stringify(db));
                renderReports();
            }
        }

        // Hapus Semua
        function clearData() {
            if(confirm('HAPUS SEMUA DATABASE?')) {
                localStorage.removeItem('romaReports');
                db = [];
                renderReports();
            }
        }
    </script>
</body>
</html>
