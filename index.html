<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM2BotValueCek - Report System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:0;
}
.container{
    max-width:600px;
    margin:80px auto;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}
input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
.sendBtn{
    background:#22c55e;
}
.adminLogo{
    position:fixed;
    top:15px;
    right:15px;
    width:40px;
    cursor:pointer;
}
.adminPanel{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000000ee;
    overflow:auto;
    padding:30px;
}
.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}
.deleteBtn{
    background:#ef4444;
    margin-top:10px;
}
.closeBtn{
    background:#64748b;
    margin-bottom:20px;
}
.counter{
    font-size:14px;
    opacity:0.7;
}
</style>
</head>
<body>

<img src="https://cdn-icons-png.flaticon.com/512/565/565547.png" class="adminLogo" onclick="openAdmin()">

<div class="container">
<h2>MM2BotValueCek Report</h2>
<p class="counter" id="reportCount"></p>

<label>Nama Pengirim</label>
<input type="text" id="nama">

<label>Tipe Laporan</label>
<select id="tipe">
<option value="Kritik">Kritik</option>
<option value="Saran">Saran</option>
<option value="Bug/Error">Bug/Error</option>
</select>

<label>Isi Laporan</label>
<textarea id="isi" rows="5"></textarea>

<button class="sendBtn" onclick="kirim()">Kirim Laporan</button>
</div>

<div class="adminPanel" id="adminPanel">
<button class="closeBtn" onclick="closeAdmin()">Tutup</button>
<h2>Dashboard Admin</h2>
<div id="adminContent"></div>
</div>

<script>

function updateCounter(){
    let data = JSON.parse(localStorage.getItem("laporan")) || [];
    document.getElementById("reportCount").innerText =
        "Total laporan masuk: " + data.length;
}

function kirim(){
    let nama = document.getElementById("nama").value.trim();
    let tipe = document.getElementById("tipe").value;
    let isi = document.getElementById("isi").value.trim();

    if(nama === "" || isi === ""){
        alert("Nama dan isi laporan tidak boleh kosong.");
        return;
    }

    let laporan = JSON.parse(localStorage.getItem("laporan")) || [];

    laporan.push({
        id: Date.now(),
        nama: nama,
        tipe: tipe,
        isi: isi,
        waktu: new Date().toLocaleString()
    });

    localStorage.setItem("laporan", JSON.stringify(laporan));

    alert("Laporan berhasil dikirim.");
    document.getElementById("nama").value="";
    document.getElementById("isi").value="";
    updateCounter();
}

function openAdmin(){
    let pwd = prompt("Masukkan password admin:");
    if(pwd !== "piala100"){
        alert("Password salah.");
        return;
    }

    document.getElementById("adminPanel").style.display="block";
    tampilkanData();
}

function closeAdmin(){
    document.getElementById("adminPanel").style.display="none";
}

function tampilkanData(){
    let laporan = JSON.parse(localStorage.getItem("laporan")) || [];
    let html = "";

    if(laporan.length === 0){
        html = "<p>Tidak ada laporan.</p>";
    }else{
        laporan.reverse().forEach((item,index)=>{
            html += `
            <div class="card">
                <b>ID:</b> ${item.id}<br>
                <b>Nama:</b> ${item.nama}<br>
                <b>Tipe:</b> ${item.tipe}<br>
                <b>Waktu:</b> ${item.waktu}<br>
                <b>Isi:</b><br>${item.isi}
                <button class="deleteBtn" onclick="hapus(${item.id})">Hapus</button>
            </div>
            `;
        });
    }

    document.getElementById("adminContent").innerHTML = html;
}

function hapus(id){
    let laporan = JSON.parse(localStorage.getItem("laporan")) || [];
    laporan = laporan.filter(item => item.id !== id);
    localStorage.setItem("laporan", JSON.stringify(laporan));
    tampilkanData();
    updateCounter();
}

updateCounter();

</script>

</body>
</html>
