<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM2BotValueCek Pro Report</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}
.container{
    max-width:600px;
    margin:80px auto;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}
input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}
.sendBtn{background:#22c55e;}
.adminBtn{
    position:fixed;
    top:15px;
    right:15px;
    background:#6366f1;
}
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:#000000dd;
    overflow:auto;
    padding:40px;
}
.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}
.deleteBtn{background:#ef4444;margin-top:10px;}
.stats{opacity:0.7;font-size:14px;}
</style>
</head>
<body>

<button class="adminBtn" onclick="loginAdmin()">Admin</button>

<div class="container">
<h2>MM2BotValueCek Report System</h2>
<p class="stats" id="totalCount">Loading...</p>

<input type="text" id="nama" placeholder="Nama Anda">
<select id="tipe">
<option>Kritik</option>
<option>Saran</option>
<option>Bug/Error</option>
</select>
<textarea id="isi" rows="4" placeholder="Minimal 20 karakter..."></textarea>
<button class="sendBtn" onclick="kirim()">Kirim</button>
<p id="notif"></p>
</div>

<div class="modal" id="adminPanel">
<h2>Dashboard Admin</h2>
<input type="text" id="search" placeholder="Cari nama..." oninput="renderData()">
<select id="filter" onchange="renderData()">
<option value="">Semua</option>
<option>Kritik</option>
<option>Saran</option>
<option>Bug/Error</option>
</select>
<div id="dataList"></div>
<button onclick="closeAdmin()">Tutup</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= CONFIG GANTI DENGAN PUNYA ANDA ================= */
const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI",
  storageBucket: "ISI",
  messagingSenderId: "ISI",
  appId: "ISI"
};
/* ================================================================ */

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let reports = [];
let cooldown = false;

function showNotif(msg,color="white"){
    const n = document.getElementById("notif");
    n.innerText = msg;
    n.style.color = color;
}

window.kirim = async function(){
    if(cooldown){
        showNotif("Tunggu 15 detik sebelum kirim lagi.","orange");
        return;
    }

    const nama = document.getElementById("nama").value.trim();
    const tipe = document.getElementById("tipe").value;
    const isi = document.getElementById("isi").value.trim();

    if(!nama || isi.length < 20){
        showNotif("Nama dan isi minimal 20 karakter.","red");
        return;
    }

    await addDoc(collection(db,"laporan"),{
        nama,tipe,isi,
        waktu: new Date()
    });

    showNotif("Laporan terkirim.","lightgreen");
    document.getElementById("isi").value="";
    cooldown = true;
    setTimeout(()=>cooldown=false,15000);
}

onSnapshot(collection(db,"laporan"),(snapshot)=>{
    reports = [];
    snapshot.forEach(doc=>{
        reports.push({id:doc.id,...doc.data()});
    });
    document.getElementById("totalCount").innerText =
        "Total laporan: "+reports.length;
    renderData();
});

window.loginAdmin = function(){
    const pwd = prompt("Password:");
    if(pwd !== "piala100"){
        alert("Salah.");
        return;
    }
    document.getElementById("adminPanel").style.display="block";
}

window.closeAdmin = function(){
    document.getElementById("adminPanel").style.display="none";
}

window.renderData = function(){
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;
    let html="";

    reports
    .filter(r=>r.nama.toLowerCase().includes(search))
    .filter(r=>!filter || r.tipe===filter)
    .sort((a,b)=>b.waktu.seconds-a.waktu.seconds)
    .forEach(r=>{
        html+=`
        <div class="card">
        <b>${r.nama}</b> (${r.tipe})<br>
        ${new Date(r.waktu.seconds*1000).toLocaleString()}<br>
        ${r.isi}
        <button class="deleteBtn" onclick="hapus('${r.id}')">Hapus</button>
        </div>`;
    });

    document.getElementById("dataList").innerHTML=html;
}

window.hapus = async function(id){
    await deleteDoc(doc(db,"laporan",id));
}
</script>

</body>
</html>
